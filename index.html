<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Scout DK | Alpha</title>
    <link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1A1D21; color: #F0F0F0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .neon-border { border: 1px solid #00E5FF; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scanner-active { animation: scan 2s infinite; }
        @keyframes scan { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 pb-32 bg-[#1A1D21] text-[#F0F0F0] font-['Inter']">

    <header class="flex justify-between items-center mb-10 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-[#00E5FF]">BIO-SCOUT</h1>
            <p class="text-[10px] tracking-[0.2em] text-gray-500 uppercase">Denmark Division</p>
        </div>
        <div class="w-12 h-12 rounded-full border border-gray-700 flex items-center justify-center bg-gray-800 text-xl">👤</div>
    </header>

    <section class="mb-10">
        <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Active Missions</h2>
        <div class="glass p-5 rounded-2xl border-l-4 border-l-[#00E5FF] bg-white/5">
            <p class="font-bold text-lg text-white">Spring Sentinel</p>
            <p class="text-sm text-gray-400">Find en Citronsommerfugl.</p>
        </div>
    </section>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-[#1A1D21]/90 backdrop-blur-xl rounded-3xl py-4 px-10 flex justify-between items-center border border-white/10 shadow-2xl z-50">
        
        <button class="text-gray-400">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
        </button>

        <button id="open-camera" class="bg-[#00E5FF] p-5 rounded-2xl shadow-[0_0_25px_rgba(0,229,255,0.6)] -mt-14 transform active:scale-90 transition-all border-4 border-[#1A1D21]">
            <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>

        <button class="text-gray-400">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4V6z"></path></svg>
        </button>
    </nav>

    <div id="camera-container" class="hidden fixed inset-0 z-[100] bg-black flex flex-col">
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
        <button id="close-camera" class="absolute top-10 right-6 text-white text-5xl font-light">&times;</button>
        <button id="capture-photo" class="absolute bottom-12 left-1/2 -translate-x-1/2 w-20 h-20 rounded-full border-4 border-white bg-[#00E5FF]/20"></button>
    </div>

    <script>
        const openBtn = document.getElementById('open-camera');
        const closeBtn = document.getElementById('close-camera');
        const cameraContainer = document.getElementById('camera-container');
        const video = document.getElementById('webcam');

        openBtn.addEventListener('click', async () => {
            cameraContainer.classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera-fejl: " + err.message);
            }
        });

        closeBtn.addEventListener('click', () => {
            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
        });
    </script>
</body>

    <script>
    const openBtn = document.getElementById('open-camera');
    const closeBtn = document.getElementById('close-camera');
    const captureBtn = document.getElementById('capture-photo');
    const cameraContainer = document.getElementById('camera-container');
    const video = document.getElementById('webcam');

    // Åbn Kamera
    openBtn.onclick = async () => {
        cameraContainer.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' } 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Kunne ikke få adgang til kameraet. Tjek dine indstillinger.");
        }
    };

    // Luk Kamera
    closeBtn.onclick = () => {
        stopStream();
        cameraContainer.classList.add('hidden');
    };

    // TAG BILLEDE OG ANALYSÉR (Simulering)
    captureBtn.onclick = () => {
        // Her "fryser" vi billedet for at lade som om vi scanner
        video.pause();
        captureBtn.innerHTML = "SCANKING...";
        captureBtn.classList.add('animate-pulse');

        // Simulering af AI-analyse (tager 2 sekunder)
        setTimeout(() => {
            alert("BIO-SCAN KOMPLET: Citronsommerfugl fundet! +500 XP");
            video.play();
            captureBtn.innerHTML = "";
            captureBtn.classList.remove('animate-pulse');
            cameraContainer.classList.add('hidden');
            stopStream();
        }, 2000);
    };

    function stopStream() {
        const stream = video.srcObject;
        if (stream) {
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
        }
    }
</script>
